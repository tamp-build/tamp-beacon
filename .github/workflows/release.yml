name: Release

# Tag-driven public release. Builds the production image and pushes to
# ghcr.io with three tag flavors:
#   - ghcr.io/tamp-build/tamp-beacon:0.1.0       (immutable, source of truth)
#   - ghcr.io/tamp-build/tamp-beacon:0.1         (floats on each patch)
#   - ghcr.io/tamp-build/tamp-beacon:latest      (floats on stable cuts)
# Pre-release tags (e.g. v0.2.0-rc.1) push :0.2.0-rc.1 + :0.2 but NOT
# :latest â€” adopters tracking :latest stay on stable cuts.
#
# Image-only â€” there is no nupkg path. tamp-beacon ships as a container.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, build the image locally but do NOT push to ghcr.io'
        type: boolean
        default: true

permissions:
  contents: write     # gh release create
  packages: write     # ghcr.io push

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

jobs:
  publish:
    name: pack + push image to ghcr.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Refuse to release a tag whose commit hasn't passed CI on a branch
      # build. Skipped on workflow_dispatch â€” that path is the manual
      # override for out-of-band publishes.
      - name: Wait for CI to pass on this commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          SHA="${{ github.sha }}"
          echo "Waiting for CI workflow run on commit $SHA"
          for i in $(seq 1 60); do
            result=$(gh run list --workflow CI --commit "$SHA" --json status,conclusion --jq '.[0] // empty')
            if [ -z "$result" ]; then
              echo "  (no CI run for this commit yet â€” attempt $i/60, sleeping 10s)"
              sleep 10
              continue
            fi
            status=$(echo "$result" | jq -r '.status')
            conclusion=$(echo "$result" | jq -r '.conclusion // ""')
            echo "  CI status=$status conclusion=$conclusion (attempt $i/60)"
            if [ "$status" != "completed" ]; then
              sleep 10
              continue
            fi
            if [ "$conclusion" = "success" ]; then
              echo "CI passed on $SHA â€” proceeding with release"
              exit 0
            fi
            echo "::error::CI conclusion is '$conclusion' on commit $SHA. Refusing to release."
            exit 1
          done
          echo "::error::Timed out waiting for CI to complete on commit $SHA after 10 minutes."
          exit 1

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF_NAME="${GITHUB_REF_NAME}"
          else
            # workflow_dispatch â€” pin to a fake dry-run version so we don't
            # accidentally produce a real-looking tag.
            REF_NAME="v0.0.0-dryrun.${GITHUB_RUN_NUMBER}"
          fi

          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn (Berry)
        run: corepack enable && corepack prepare yarn@4.5.0 --activate

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Yarn build SPA
        working-directory: web
        run: |
          yarn install --immutable
          yarn build

      - name: Copy SPA into wwwroot
        shell: bash
        run: |
          mkdir -p src/Tamp.Beacon/wwwroot
          cp -R web/dist/. src/Tamp.Beacon/wwwroot/

      - name: dotnet publish (linux-musl-x64 â†’ publish/amd64)
        run: |
          mkdir -p publish/amd64
          dotnet publish src/Tamp.Beacon/Tamp.Beacon.csproj \
            -c Release \
            -r linux-musl-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o publish/amd64/

      - name: dotnet publish (linux-musl-arm64 â†’ publish/arm64)
        run: |
          mkdir -p publish/arm64
          dotnet publish src/Tamp.Beacon/Tamp.Beacon.csproj \
            -c Release \
            -r linux-musl-arm64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o publish/arm64/

      # QEMU registers the arm64 emulation handler so buildx can run the
      # arm64 image steps on this amd64 runner. The dotnet publish above
      # is native cross-compilation (no emulation needed); only the
      # Dockerfile's `apk add` + `chmod` steps need QEMU.
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tamp-beacon
          # Tag scheme:
          #   semver full      â†’ 0.1.0
          #   semver minor     â†’ 0.1     (floats on patch)
          #   latest           â†’ only for non-prerelease tags
          # `pattern` extracts from the tag ref (vX.Y.Z[-suffix]).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(steps.version.outputs.ref_name, '-') }}
            type=raw,value=dryrun-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}
          # COMMIT_SHA + version stamped onto the image; visible via
          # `docker inspect`.
          labels: |
            org.opencontainers.image.title=tamp-beacon
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.dry_run == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Auto-generate GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.ref_name }}" \
            --title "tamp-beacon ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          echo "DRY RUN â€” would have pushed:"
          echo "${{ steps.meta.outputs.tags }}"
