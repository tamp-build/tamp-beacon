name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # tamp-beacon ships as a linux container — no need for the cross-OS
    # matrix Tamp itself uses (Tamp is a NuGet package consumed on any
    # platform). Ubuntu is the only OS that matters here.
    name: build & test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      TampCoreMode: package
      # Dogfood — emit a Tamp build span to the lab beacon on every CI
      # run so we can see ourselves on the dashboard under tamp →
      # main-ci / pr-validation. ENDPOINT is a non-secret repo Variable;
      # HEADERS carries the Bearer token and is a repo Secret. Vars +
      # secrets are set via `gh variable set` / `gh secret set` and
      # never logged — Tamp.Telemetry reads them at process start.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      OTEL_SERVICE_NAME: tamp-beacon
      TAMP_BUILD_CONFIG_NAME: ${{ github.event_name == 'pull_request' && 'pr-validation' || 'main-ci' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Node.js (for yarn build of the SPA)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn (Berry)
        run: corepack enable && corepack prepare yarn@4.5.0 --activate

      - name: Verify toolchain
        shell: bash
        run: |
          dotnet --info
          dotnet --list-sdks
          node --version
          yarn --version

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Yarn install (immutable)
        working-directory: web
        run: yarn install --immutable

      - name: Yarn build SPA
        working-directory: web
        run: yarn build

      - name: Copy SPA into wwwroot
        shell: bash
        run: |
          mkdir -p src/Tamp.Beacon/wwwroot
          cp -R web/dist/. src/Tamp.Beacon/wwwroot/

      - name: Restore
        run: dotnet restore Tamp.Beacon.slnx

      - name: Build
        run: dotnet build Tamp.Beacon.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Tamp.Beacon.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          if-no-files-found: warn

      - name: Install dotnet-tamp (for the telemetry emit)
        if: env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        run: dotnet tool install --global dotnet-tamp --version 1.0.0

      - name: Emit Tamp build span to the lab beacon
        if: env.OTEL_EXPORTER_OTLP_ENDPOINT != ''
        shell: bash
        run: |
          # Cheap target — just exercises Build.cs's Main(). The
          # build/Build.csproj already references Tamp.Telemetry; its
          # FromEnvironment() reads the OTEL_* env above and ships a
          # single Build span. PR-validation runs land under one
          # BuildConfig, main pushes under another.
          dotnet tamp Info
