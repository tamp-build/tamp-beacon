name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # tamp-beacon ships as a linux container — no need for the cross-OS
    # matrix Tamp itself uses (Tamp is a NuGet package consumed on any
    # platform). Ubuntu is the only OS that matters here.
    name: build & test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      TampCoreMode: package
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_BUILD_LABEL: tamp-beacon
      # Dogfood — emit Build / Target / Command spans to the lab beacon
      # on every CI run. The whole pipeline runs through `dotnet tamp
      # Test` so each step in Build.cs's target graph (Restore, YarnInstall,
      # FrontendBuild, CopyWwwroot, Compile, Test) lands a span. ENDPOINT
      # is a non-secret repo Variable; HEADERS carries the Bearer token
      # and is a repo Secret. Tamp.Telemetry reads them at process start.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      OTEL_SERVICE_NAME: tamp-beacon
      TAMP_BUILD_CONFIG_NAME: ${{ github.event_name == 'pull_request' && 'pr-validation' || 'main-ci' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Node.js (for yarn build of the SPA)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn (Berry)
        run: corepack enable && corepack prepare yarn@4.5.0 --activate

      - name: Verify toolchain
        shell: bash
        run: |
          dotnet --info
          node --version
          yarn --version

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install dotnet-tamp
        run: dotnet tool install --global dotnet-tamp --version 1.0.0

      - name: tamp Test (drives Restore → YarnInstall → FrontendBuild → CopyWwwroot → Compile → Test through Build.cs)
        run: dotnet tamp Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./artifacts/test-results/**/*.trx
          if-no-files-found: warn
